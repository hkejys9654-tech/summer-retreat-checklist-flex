<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>하계수양회 준비물 체크리스트</title>
  <meta name="theme-color" content="#2f6df6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="하계수양회 준비물">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <style>
    :root {
      color-scheme: light;
      --ink: #151515;
      --muted: #6e6a60;
      --line: #e5ded2;
      --paper: #f4efe6;
      --surface: #ffffff;
      --surface-strong: #f8f4ec;
      --blue: #1f6f5b;
      --mint: #2f8f72;
      --yellow: #c6a15b;
      --coral: #b85c4a;
      --violet: #384150;
      --shadow: 0 16px 40px rgba(38, 34, 28, 0.12);
      --fast: 160ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background:
        linear-gradient(120deg, rgba(31, 111, 91, 0.10), transparent 34%),
        linear-gradient(240deg, rgba(198, 161, 91, 0.13), transparent 40%),
        var(--paper);
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      letter-spacing: 0;
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      touch-action: manipulation;
    }

    .app {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      padding: 8px 0 18px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 10px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 850;
    }

    .kicker::before {
      content: "";
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: var(--yellow);
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 0.95;
      letter-spacing: 0;
      word-break: keep-all;
      text-wrap: balance;
    }

    .title-line {
      display: block;
    }

    .subtitle {
      margin: 14px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
    }

    .progress-panel {
      width: min(330px, 100%);
      padding: 18px;
      border: 1px solid rgba(23, 23, 23, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .progress-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
    }

    .progress-count {
      font-size: 15px;
      color: var(--muted);
      font-weight: 700;
    }

    .progress-rate {
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      color: var(--blue);
    }

    .progress-track {
      position: relative;
      overflow: hidden;
      height: 12px;
      margin-top: 14px;
      border-radius: 999px;
      background: #e9edf4;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--yellow), var(--mint), var(--blue));
      transition: width 280ms ease;
    }

    .toolbar {
      position: sticky;
      top: 8px;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin: 8px 0 24px;
      padding: 12px;
      border: 1px solid rgba(23, 23, 23, 0.08);
      border-radius: 8px;
      background: rgba(255, 250, 242, 0.86);
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 24px rgba(22, 28, 45, 0.08);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn,
    .action-btn {
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-weight: 800;
      transition: transform var(--fast), border-color var(--fast), background var(--fast), color var(--fast), box-shadow var(--fast);
    }

    .filter-btn:hover,
    .action-btn:hover {
      transform: translateY(-2px);
      border-color: var(--blue);
      box-shadow: 0 10px 18px rgba(47, 109, 246, 0.14);
    }

    .filter-btn.is-active {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .action-btn::before {
      content: "↺";
      width: 16px;
      height: 16px;
      display: grid;
      place-items: center;
      font-size: 17px;
      line-height: 1;
    }

    .adder {
      display: grid;
      grid-template-columns: minmax(145px, 180px) 1fr auto;
      gap: 10px;
      margin: 10px 0 24px;
      padding: 12px;
      border: 1px dashed rgba(47, 109, 246, 0.35);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
    }

    .category-adder {
      grid-template-columns: 1fr auto;
    }

    .add-panel {
      margin: 0 0 24px;
    }

    .add-panel summary {
      list-style: none;
    }

    .add-panel summary::-webkit-details-marker {
      display: none;
    }

    .add-toggle {
      min-height: 44px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(47, 109, 246, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--blue);
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(22, 28, 45, 0.06);
    }

    .add-toggle::before {
      content: "+";
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      line-height: 1;
    }

    .adder select,
    .adder input {
      min-height: 46px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
      transition: border-color var(--fast), box-shadow var(--fast);
    }

    .adder select {
      padding: 0 12px;
      font-weight: 800;
    }

    .adder input {
      padding: 0 14px;
      font-weight: 700;
    }

    .adder select:focus,
    .adder input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(47, 109, 246, 0.14);
    }

    .add-btn {
      min-height: 46px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      font-weight: 900;
      transition: transform var(--fast), background var(--fast), box-shadow var(--fast);
    }

    .add-btn:hover {
      transform: translateY(-2px);
      background: var(--blue);
      box-shadow: 0 12px 24px rgba(47, 109, 246, 0.24);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .category {
      min-width: 0;
      padding: 16px;
      border: 1px solid rgba(23, 23, 23, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 12px 28px rgba(22, 28, 45, 0.08);
      transition: transform var(--fast), box-shadow var(--fast), border-color var(--fast);
    }

    .category:hover {
      transform: translateY(-3px);
      border-color: rgba(47, 109, 246, 0.22);
      box-shadow: 0 18px 36px rgba(22, 28, 45, 0.14);
    }

    .category-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .category-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .category-mark {
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--surface-strong);
      color: var(--blue);
      font-size: 16px;
      font-weight: 900;
    }

    .category-count {
      flex: 0 0 auto;
      padding: 7px 10px;
      border-radius: 999px;
      background: #f0f3f7;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .category-tools {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .category-action {
      min-height: 30px;
      padding: 0 9px;
      border: 1px solid rgba(23, 23, 23, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      transition: transform var(--fast), color var(--fast), border-color var(--fast), background var(--fast);
    }

    .category-action:hover {
      transform: translateY(-1px);
      border-color: rgba(31, 111, 91, 0.28);
      color: var(--blue);
    }

    .category-delete-btn:hover {
      border-color: rgba(184, 92, 74, 0.32);
      color: var(--coral);
    }

    .items {
      display: grid;
      gap: 9px;
    }

    .category-add-panel {
      margin-top: 10px;
    }

    .category-add-panel summary {
      list-style: none;
    }

    .category-add-panel summary::-webkit-details-marker {
      display: none;
    }

    .category-add-toggle {
      min-height: 38px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px dashed rgba(31, 111, 91, 0.28);
      border-radius: 8px;
      background: rgba(248, 244, 236, 0.62);
      color: var(--blue);
      font-size: 13px;
      font-weight: 900;
    }

    .category-add-toggle::before {
      content: "+";
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      line-height: 1;
    }

    .category-item-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
      gap: 8px;
      margin-top: 8px;
    }

    .category-item-form input {
      min-height: 42px;
      width: 100%;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      outline: none;
      font-weight: 800;
    }

    .category-item-form input:focus {
      border-color: rgba(31, 111, 91, 0.52);
      box-shadow: 0 0 0 4px rgba(31, 111, 91, 0.12);
    }

    .category-item-form button {
      min-height: 42px;
      padding: 0 14px;
      border: 0;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-weight: 900;
      white-space: nowrap;
    }

    .category-empty {
      margin: 4px 0 0;
      padding: 14px 10px;
      border: 1px dashed rgba(23, 23, 23, 0.12);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      text-align: center;
    }

    .item {
      position: relative;
      min-height: 58px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 3px 0 rgba(23, 23, 23, 0.04);
      transition: transform var(--fast), border-color var(--fast), background var(--fast), color var(--fast), box-shadow var(--fast);
    }

    .item-main {
      min-height: 58px;
      width: 100%;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      gap: 11px;
      align-items: center;
      padding: 10px 86px 10px 10px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: inherit;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }

    .item:hover {
      transform: translateY(-3px) scale(1.01);
      border-color: rgba(47, 109, 246, 0.62);
      box-shadow: 0 14px 26px rgba(47, 109, 246, 0.14);
    }

    .item:active {
      transform: translateY(0) scale(0.985);
    }

    .item-main:focus-visible,
    .edit-btn:focus-visible,
    .category-action:focus-visible,
    .delete-btn:focus-visible {
      outline: 3px solid rgba(47, 109, 246, 0.32);
      outline-offset: 2px;
    }

    .item.is-checked {
      border-color: rgba(25, 169, 116, 0.45);
      background: linear-gradient(90deg, rgba(25, 169, 116, 0.16), rgba(47, 109, 246, 0.10));
      box-shadow: 0 8px 18px rgba(25, 169, 116, 0.13);
    }

    .check {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 2px solid #c5ced9;
      background: #fff;
      color: #fff;
      transition: transform var(--fast), border-color var(--fast), background var(--fast);
    }

    .check::before {
      content: "";
      width: 13px;
      height: 7px;
      border-left: 3px solid currentColor;
      border-bottom: 3px solid currentColor;
      transform: rotate(-45deg) translate(1px, -1px) scale(0);
      transition: transform 180ms ease;
    }

    .item.is-checked .check {
      border-color: var(--mint);
      background: var(--mint);
      transform: rotate(4deg) scale(1.08);
    }

    .item.is-checked .check::before {
      transform: rotate(-45deg) translate(1px, -1px) scale(1);
    }

    .item-name {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 16px;
      font-weight: 850;
      line-height: 1.25;
    }

    .item.is-checked .item-name {
      color: #244235;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: rgba(25, 169, 116, 0.48);
    }

    .item-note {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
    }

    .badge {
      min-width: 44px;
      padding: 6px 8px;
      border-radius: 999px;
      background: #f3f5f8;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      transition: background var(--fast), color var(--fast), transform var(--fast);
    }

    .item.is-checked .badge {
      background: var(--mint);
      color: #fff;
      transform: scale(1.04);
    }

    .item-actions {
      position: absolute;
      top: 50%;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-50%) scale(0.94);
      transition: opacity var(--fast), transform var(--fast);
    }

    .edit-btn,
    .delete-btn {
      width: 36px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(23, 23, 23, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
      line-height: 1;
      white-space: nowrap;
      transition: background var(--fast), color var(--fast), box-shadow var(--fast), border-color var(--fast);
    }

    .delete-btn {
      width: 32px;
      color: var(--coral);
      font-size: 16px;
      border-color: rgba(184, 92, 74, 0.22);
    }

    .item:hover .item-actions,
    .item:focus-within .item-actions {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%) scale(1);
    }

    .edit-btn:hover {
      border-color: rgba(31, 111, 91, 0.28);
      background: var(--blue);
      color: #fff;
      box-shadow: 0 10px 18px rgba(31, 111, 91, 0.18);
    }

    .delete-btn:hover {
      background: var(--coral);
      color: #fff;
      box-shadow: 0 10px 18px rgba(184, 92, 74, 0.22);
    }

    .item.is-hidden {
      display: none;
    }

    .burst {
      position: absolute;
      inset: 50% auto auto 18px;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--yellow);
      pointer-events: none;
      animation: pop 520ms ease forwards;
      box-shadow:
        20px -14px 0 var(--coral),
        34px 5px 0 var(--blue),
        14px 17px 0 var(--mint),
        -11px 11px 0 var(--violet);
    }

    @keyframes pop {
      from {
        opacity: 0.95;
        transform: translate(-50%, -50%) scale(0.3) rotate(0deg);
      }
      to {
        opacity: 0;
        transform: translate(-50%, -50%) scale(2.4) rotate(24deg);
      }
    }

    .empty {
      display: none;
      margin: 22px 0;
      padding: 22px;
      border: 1px dashed rgba(23, 23, 23, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--muted);
      font-weight: 800;
      text-align: center;
    }

    .empty.is-visible {
      display: block;
    }

    .edit-dialog[hidden] {
      display: none;
    }

    .edit-dialog {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      align-items: end;
      padding: 18px;
    }

    .edit-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(21, 21, 21, 0.34);
      backdrop-filter: blur(6px);
    }

    .edit-sheet {
      position: relative;
      width: min(460px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 24px 60px rgba(21, 21, 21, 0.22);
    }

    .edit-eyebrow {
      margin: 0 0 5px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
    }

    .edit-title {
      margin: 0;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .edit-copy {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 700;
    }

    .edit-field {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
    }

    .edit-field input {
      width: 100%;
      min-height: 46px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      outline: none;
      font-size: 15px;
      font-weight: 800;
    }

    .edit-field input:focus {
      border-color: rgba(31, 111, 91, 0.52);
      box-shadow: 0 0 0 4px rgba(31, 111, 91, 0.12);
    }

    .edit-actions {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 8px;
    }

    .edit-cancel,
    .edit-save {
      min-height: 44px;
      border-radius: 8px;
      font-weight: 900;
      border: 1px solid var(--line);
    }

    .edit-cancel {
      background: #fff;
      color: var(--muted);
    }

    .edit-save {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .progress-panel {
        width: 100%;
      }

      .board {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      .app {
        width: 100%;
        padding: calc(12px + env(safe-area-inset-top)) 12px 36px;
      }

      .topbar {
        gap: 10px;
        align-items: stretch;
        padding: 15px;
        border: 1px solid rgba(23, 23, 23, 0.06);
        border-radius: 8px;
        background: linear-gradient(135deg, #ffffff 0%, #faf7ef 58%, #f2f8f4 100%);
        box-shadow: 0 10px 24px rgba(38, 34, 28, 0.09);
      }

      .kicker {
        margin-bottom: 8px;
        font-size: 12px;
      }

      .kicker::before {
        width: 16px;
        height: 2px;
      }

      h1 {
        max-width: 100%;
        font-size: 23px;
        line-height: 1.18;
      }

      .title-line {
        display: block;
      }

      .subtitle {
        display: none;
      }

      .progress-panel {
        padding: 11px;
        border-color: rgba(31, 111, 91, 0.12);
        background: rgba(255, 255, 255, 0.78);
        box-shadow: none;
      }

      .progress-count {
        font-size: 13px;
      }

      .progress-rate {
        font-size: 23px;
      }

      .progress-track {
        height: 10px;
        margin-top: 10px;
      }

      .toolbar,
      .adder {
        grid-template-columns: 1fr;
      }

      .toolbar {
        position: static;
        gap: 10px;
        margin: 12px 0;
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        padding: 4px;
        border: 1px solid rgba(23, 23, 23, 0.08);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
      }

      .filter-btn {
        min-height: 40px;
        padding: 0 6px;
        border: 0;
        background: transparent;
        font-size: 14px;
      }

      .filter-btn:hover {
        transform: none;
        box-shadow: none;
      }

      .filter-btn.is-active {
        background: var(--blue);
        box-shadow: 0 8px 18px rgba(31, 111, 91, 0.18);
      }

      .action-btn {
        min-height: 40px;
        border-color: rgba(23, 23, 23, 0.08);
        background: rgba(255, 255, 255, 0.82);
        font-size: 14px;
      }

      .action-btn:hover {
        transform: none;
        box-shadow: none;
      }

      .add-panel {
        margin: 0 0 12px;
      }

      .add-toggle {
        min-height: 42px;
        font-size: 14px;
        box-shadow: none;
      }

      .adder {
        gap: 8px;
        margin: 8px 0 0;
        padding: 10px;
        border-style: solid;
        border-color: rgba(23, 23, 23, 0.08);
        background: rgba(255, 255, 255, 0.82);
      }

      .adder select,
      .adder input,
      .add-btn {
        min-height: 42px;
        font-size: 14px;
      }

      .category-adder,
      .category-item-form {
        grid-template-columns: 1fr;
      }

      .category-item-form button {
        width: 100%;
      }

      .action-btn,
      .add-btn {
        width: 100%;
      }

      .board {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .category {
        padding: 12px;
        box-shadow: 0 8px 18px rgba(22, 28, 45, 0.07);
      }

      .category:hover {
        transform: none;
        box-shadow: 0 8px 18px rgba(22, 28, 45, 0.07);
      }

      .category-head {
        gap: 8px;
        margin-bottom: 10px;
        align-items: flex-start;
      }

      .category-title {
        gap: 8px;
        font-size: 18px;
      }

      .category-mark {
        flex-basis: 30px;
        width: 30px;
        height: 30px;
        font-size: 13px;
      }

      .category-count {
        padding: 6px 8px;
        font-size: 12px;
      }

      .category-tools {
        gap: 4px;
      }

      .category-action {
        min-height: 28px;
        padding: 0 7px;
        font-size: 11px;
      }

      .items {
        gap: 8px;
      }

      .item {
        min-height: 54px;
        box-shadow: none;
      }

      .item:hover {
        transform: none;
        border-color: var(--line);
        box-shadow: none;
      }

      .item-main {
        min-height: 54px;
        grid-template-columns: 30px minmax(0, 1fr);
        gap: 10px;
        padding: 10px 84px 10px 10px;
      }

      .check {
        width: 30px;
        height: 30px;
        border-radius: 8px;
      }

      .item-name {
        font-size: 15px;
        line-height: 1.28;
      }

      .item-note {
        font-size: 12px;
      }

      .badge {
        display: none;
      }

      .item-actions {
        right: 8px;
        gap: 3px;
        opacity: 1;
        pointer-events: auto;
        transform: translateY(-50%) scale(1);
      }

      .edit-btn,
      .delete-btn {
        width: 38px;
        height: 30px;
        border: 0;
        background: transparent;
        font-size: 11px;
      }

      .delete-btn {
        width: 28px;
        color: rgba(255, 107, 87, 0.72);
        font-size: 18px;
      }

      .edit-btn:hover,
      .delete-btn:hover {
        background: rgba(255, 107, 87, 0.1);
        color: var(--coral);
        box-shadow: none;
      }

      .edit-dialog {
        padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      }

      .edit-sheet {
        padding: 16px;
      }

      .edit-title {
        font-size: 20px;
      }
    }

    @media (hover: none) {
      .item-actions {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(-50%) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="체크리스트 요약">
      <div>
        <p class="kicker">준비물 체크</p>
        <h1><span class="title-line">하계수양회</span><span class="title-line">준비물 체크리스트</span></h1>
      </div>

      <aside class="progress-panel" aria-live="polite">
        <div class="progress-row">
          <span class="progress-count" id="progressCount">0 / 0 완료</span>
          <strong class="progress-rate" id="progressRate">0%</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </aside>
    </section>

    <section class="toolbar" aria-label="보기 옵션">
      <div class="filters" role="group" aria-label="체크 상태 필터">
        <button class="filter-btn is-active" type="button" data-filter="all">전체</button>
        <button class="filter-btn" type="button" data-filter="todo">남은 것</button>
        <button class="filter-btn" type="button" data-filter="done">완료</button>
      </div>
      <button class="action-btn" id="resetBtn" type="button">체크 초기화</button>
    </section>

    <details class="add-panel">
      <summary class="add-toggle">대분류 추가</summary>
      <form class="adder category-adder" id="categoryAddForm">
        <input id="categoryNameInput" type="text" autocomplete="off" placeholder="예: 여벌 옷, 간식, 개인 준비물">
        <button class="add-btn" type="submit">추가</button>
      </form>
    </details>

    <section class="board" id="board" aria-label="준비물 목록"></section>
    <p class="empty" id="emptyState">지금 보기에는 표시할 항목이 없습니다.</p>
  </main>

  <div class="edit-dialog" id="editDialog" hidden>
    <div class="edit-backdrop" data-close-editor></div>
    <form class="edit-sheet" id="editForm">
      <div>
        <p class="edit-eyebrow" id="editEyebrow">수정</p>
        <h2 class="edit-title" id="editTitle">항목 수정</h2>
        <p class="edit-copy" id="editCopy"></p>
      </div>

      <label class="edit-field" id="editNameField">
        <span>이름</span>
        <input id="editNameInput" type="text" autocomplete="off">
      </label>

      <label class="edit-field" id="editNoteField">
        <span>설명</span>
        <input id="editNoteInput" type="text" autocomplete="off" placeholder="선택">
      </label>

      <div class="edit-actions">
        <button class="edit-cancel" id="editCancelBtn" type="button">취소</button>
        <button class="edit-save" id="editSaveBtn" type="submit">저장</button>
      </div>
    </form>
  </div>

  <script>
    const STORAGE_KEY = "summer-retreat-service-checklist-v1";
    const CUSTOM_KEY = "summer-retreat-service-custom-items-v1";
    const CUSTOM_CATEGORY_KEY = "summer-retreat-service-custom-categories-v1";
    const DELETED_KEY = "summer-retreat-service-deleted-items-v1";
    const CATEGORY_KEY = "summer-retreat-service-category-edits-v1";
    const ITEM_KEY = "summer-retreat-service-item-edits-v1";

    const categories = [
      {
        id: "wear",
        title: "입고 갈 옷",
        mark: "01",
        items: [
          { id: "wear-tshirt", name: "반팔" },
          { id: "wear-jeans", name: "청바지" },
          { id: "wear-boots", name: "신발", note: "등산화 검정색" },
          { id: "wear-crocs", name: "신발", note: "크록스 검정" }
        ]
      },
      {
        id: "work",
        title: "침례복",
        mark: "02",
        items: [
          { id: "work-training", name: "검정 츄리닝" },
          { id: "work-uniqlo", name: "유니클로 비닐" },
          { id: "work-socks", name: "검정색 긴 양말" },
          { id: "work-northface", name: "하계수양회 검정 반팔" },
          { id: "work-cap", name: "군대 모자" }
        ]
      },
      {
        id: "sleep",
        title: "잠옷",
        mark: "03",
        items: [
          { id: "sleep-underwear", name: "여벌 속옷" },
          { id: "sleep-shorts", name: "반바지" },
          { id: "sleep-northface", name: "하계수양회 검정 반팔", note: "일어나서 그대로 침례복으로 활용" },
          { id: "sleep-neckpillow", name: "목베개" }
        ]
      },
      {
        id: "wash",
        title: "세면도구",
        mark: "04",
        items: [
          { id: "wash-essential", name: "에센셜" },
          { id: "wash-cream", name: "수분크림" },
          { id: "wash-bb", name: "비비크림" },
          { id: "wash-swab", name: "면봉" },
          { id: "wash-razor", name: "면도기" },
          { id: "wash-hair", name: "헤어에센스" },
          { id: "wash-kit", name: "세면도구 가방", note: "샴푸, 클렌징 등 들어있음" },
          { id: "wash-towel", name: "수건 한 장" },
          { id: "wash-hanger", name: "옷걸이" },
          { id: "wash-ecobag", name: "에코백" }
        ]
      },
      {
        id: "medicine",
        title: "약",
        mark: "05",
        items: [
          { id: "medicine-tylenol", name: "타이레놀" },
          { id: "medicine-blood-pressure", name: "혈압약" },
          { id: "medicine-rhinitis", name: "비염약" }
        ]
      },
      {
        id: "electronics",
        title: "전자기기",
        mark: "06",
        items: [
          { id: "study-ipad", name: "아이패드" },
          { id: "study-charger", name: "아이패드 충전기", note: "시계 충전기 같이 있는 삼단짜리" }
        ]
      },
      {
        id: "study",
        title: "필기 도구",
        mark: "07",
        items: [
          { id: "study-bible", name: "성경책" },
          { id: "study-note", name: "노트" },
          { id: "study-pencil-case", name: "필통" }
        ]
      },
      {
        id: "plus",
        title: "기타",
        mark: "08",
        items: [
          { id: "plus-gloves", name: "작업 장갑" },
          { id: "plus-battery", name: "보조배터리" },
          { id: "plus-phone-charger", name: "휴대폰 충전기" },
          { id: "plus-water", name: "물병" },
          { id: "plus-sunscreen", name: "선크림" },
          { id: "plus-bug", name: "모기 패치 또는 벌레퇴치제" },
          { id: "plus-rain", name: "작은 우산 또는 우비" }
        ]
      }
    ];

    let checkedItems = loadSet(STORAGE_KEY);
    let customItems = loadCustomItems();
    let customCategories = loadCustomCategories();
    let deletedItems = loadSet(DELETED_KEY);
    let categoryEdits = loadObject(CATEGORY_KEY);
    let itemEdits = loadObject(ITEM_KEY);
    let currentFilter = "all";

    const board = document.getElementById("board");
    const progressCount = document.getElementById("progressCount");
    const progressRate = document.getElementById("progressRate");
    const progressFill = document.getElementById("progressFill");
    const resetBtn = document.getElementById("resetBtn");
    const emptyState = document.getElementById("emptyState");
    const categoryAddForm = document.getElementById("categoryAddForm");
    const categoryNameInput = document.getElementById("categoryNameInput");
    const editDialog = document.getElementById("editDialog");
    const editForm = document.getElementById("editForm");
    const editEyebrow = document.getElementById("editEyebrow");
    const editTitle = document.getElementById("editTitle");
    const editCopy = document.getElementById("editCopy");
    const editNameField = document.getElementById("editNameField");
    const editNameInput = document.getElementById("editNameInput");
    const editNoteField = document.getElementById("editNoteField");
    const editNoteInput = document.getElementById("editNoteInput");
    const editSaveBtn = document.getElementById("editSaveBtn");
    const editCancelBtn = document.getElementById("editCancelBtn");
    let editorState = null;

    function loadSet(key) {
      try {
        return new Set(JSON.parse(localStorage.getItem(key) || "[]"));
      } catch {
        return new Set();
      }
    }

    function loadCustomItems() {
      try {
        return JSON.parse(localStorage.getItem(CUSTOM_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function loadCustomCategories() {
      try {
        return JSON.parse(localStorage.getItem(CUSTOM_CATEGORY_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function loadObject(key) {
      try {
        return JSON.parse(localStorage.getItem(key) || "{}");
      } catch {
        return {};
      }
    }

    function saveChecked() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...checkedItems]));
    }

    function saveCustomItems() {
      localStorage.setItem(CUSTOM_KEY, JSON.stringify(customItems));
    }

    function saveCustomCategories() {
      localStorage.setItem(CUSTOM_CATEGORY_KEY, JSON.stringify(customCategories));
    }

    function saveDeletedItems() {
      localStorage.setItem(DELETED_KEY, JSON.stringify([...deletedItems]));
    }

    function saveCategoryEdits() {
      localStorage.setItem(CATEGORY_KEY, JSON.stringify(categoryEdits));
    }

    function saveItemEdits() {
      localStorage.setItem(ITEM_KEY, JSON.stringify(itemEdits));
    }

    function activeCategories() {
      return [...categories, ...customCategories]
        .filter((category) => !categoryEdits[category.id]?.deleted)
        .map((category, index) => ({
          ...category,
          mark: category.mark || String(index + 1).padStart(2, "0"),
          title: categoryEdits[category.id]?.title || category.title
        }));
    }

    function applyItemEdit(item) {
      const edit = itemEdits[item.id] || {};
      return {
        ...item,
        name: edit.name || item.name,
        note: Object.prototype.hasOwnProperty.call(edit, "note") ? edit.note : item.note
      };
    }

    function allCategories() {
      const clone = activeCategories().map((category) => ({
        ...category,
        items: (category.items || [])
          .filter((item) => !deletedItems.has(item.id))
          .map(applyItemEdit)
      }));

      customItems.forEach((item) => {
        if (deletedItems.has(item.id)) return;
        if (categoryEdits[item.categoryId]?.deleted) return;

        const target = clone.find((category) => category.id === item.categoryId) || clone[clone.length - 1];
        if (target) target.items.push(applyItemEdit(item));
      });

      return clone;
    }

    function allItems() {
      return allCategories().flatMap((category) => category.items.map((item) => ({
        ...item,
        categoryId: category.id
      })));
    }

    function render() {
      const categoryList = allCategories();

      board.innerHTML = categoryList.map((category) => {
        const checkedCount = category.items.filter((item) => checkedItems.has(item.id)).length;
        const categoryTitle = escapeHtml(category.title);
        const itemButtons = category.items.map((item) => {
          const isChecked = checkedItems.has(item.id);
          const hidden = currentFilter === "done" && !isChecked || currentFilter === "todo" && isChecked;
          const note = item.note ? `<span class="item-note">${escapeHtml(item.note)}</span>` : "";
          const deleteLabel = `${item.name} 삭제`;
          const editLabel = `${item.name} 수정`;

          return `
            <div
              class="item ${isChecked ? "is-checked" : ""} ${hidden ? "is-hidden" : ""}"
              data-id="${item.id}"
            >
              <button
                class="item-main"
                type="button"
                data-id="${item.id}"
                aria-pressed="${isChecked}"
              >
                <span class="check" aria-hidden="true"></span>
                <span class="item-name">${escapeHtml(item.name)}${note}</span>
                <span class="badge">${isChecked ? "완료" : "대기"}</span>
              </button>
              <span class="item-actions">
                <button
                  class="edit-btn"
                  type="button"
                  data-id="${item.id}"
                  aria-label="${escapeHtml(editLabel)}"
                  title="수정"
                >수정</button>
                <button
                  class="delete-btn"
                  type="button"
                  data-id="${item.id}"
                  aria-label="${escapeHtml(deleteLabel)}"
                  title="삭제"
                >&times;</button>
              </span>
            </div>
          `;
        }).join("");
        const emptyItems = itemButtons ? "" : `<p class="category-empty">아직 항목이 없습니다.</p>`;

        return `
          <article class="category" data-category="${category.id}">
            <div class="category-head">
              <h2 class="category-title">
                <span class="category-mark">${category.mark}</span>
                <span>${categoryTitle}</span>
              </h2>
              <div class="category-tools">
                <span class="category-count">${checkedCount}/${category.items.length}</span>
                <button class="category-action category-edit-btn" type="button" data-category-id="${category.id}">수정</button>
                <button class="category-action category-delete-btn" type="button" data-category-id="${category.id}">삭제</button>
              </div>
            </div>
            <div class="items">${itemButtons}${emptyItems}</div>
            <details class="category-add-panel">
              <summary class="category-add-toggle">${categoryTitle}에 항목 추가</summary>
              <form class="category-item-form" data-category-id="${category.id}">
                <input class="category-item-input" type="text" autocomplete="off" placeholder="준비물 이름" aria-label="${categoryTitle}에 준비물 추가">
                <input class="category-item-note-input" type="text" autocomplete="off" placeholder="설명/메모 선택" aria-label="${categoryTitle} 준비물 설명">
                <button type="submit">추가</button>
              </form>
            </details>
          </article>
        `;
      }).join("");

      updateProgress();
      updateEmptyState();
    }

    function updateProgress() {
      const total = allItems().length;
      const done = allItems().filter((item) => checkedItems.has(item.id)).length;
      const percent = total ? Math.round(done / total * 100) : 0;

      progressCount.textContent = `${done} / ${total} 완료`;
      progressRate.textContent = `${percent}%`;
      progressFill.style.width = `${percent}%`;
    }

    function updateEmptyState() {
      const visibleItems = board.querySelectorAll(".item:not(.is-hidden)").length;
      const visibleCategories = board.querySelectorAll(".category").length;
      emptyState.classList.toggle("is-visible", visibleItems === 0 && visibleCategories === 0);
    }

    function toggleItem(button) {
      const id = button.dataset.id;
      const becameChecked = !checkedItems.has(id);

      if (becameChecked) {
        checkedItems.add(id);
      } else {
        checkedItems.delete(id);
      }

      saveChecked();
      render();

      if (becameChecked) {
        const freshButton = board.querySelector(`[data-id="${CSS.escape(id)}"]`);
        if (freshButton) showBurst(freshButton);
      }
    }

    function deleteItem(button) {
      const id = button.dataset.id;
      const customCountBefore = customItems.length;

      customItems = customItems.filter((item) => item.id !== id);
      if (customItems.length !== customCountBefore) {
        saveCustomItems();
      } else {
        deletedItems.add(id);
        saveDeletedItems();
      }

      checkedItems.delete(id);
      delete itemEdits[id];
      saveChecked();
      saveItemEdits();
      render();
    }

    function findCategory(categoryId) {
      return allCategories().find((category) => category.id === categoryId);
    }

    function findItem(itemId) {
      return allCategories()
        .flatMap((category) => category.items.map((item) => ({ ...item, categoryId: category.id })))
        .find((item) => item.id === itemId);
    }

    function editCategory(button) {
      const categoryId = button.dataset.categoryId;
      const category = findCategory(categoryId);
      if (!category) return;

      openEditor({
        type: "category",
        id: categoryId,
        eyebrow: "카테고리",
        title: "카테고리 수정",
        copy: "입고 갈 옷, 침례복, 잠옷 같은 큰 묶음 이름을 바꿉니다.",
        name: category.title,
        showName: true,
        showNote: false,
        submitLabel: "저장"
      });
    }

    function deleteCategory(button) {
      const categoryId = button.dataset.categoryId;
      const category = findCategory(categoryId);
      if (!category) return;

      openEditor({
        type: "delete-category",
        id: categoryId,
        eyebrow: "삭제 확인",
        title: `${category.title} 삭제`,
        copy: "이 카테고리와 안의 준비물이 화면에서 숨겨집니다.",
        showName: false,
        showNote: false,
        submitLabel: "삭제"
      });
    }

    function editItem(button) {
      const id = button.dataset.id;
      const item = findItem(id);
      if (!item) return;

      openEditor({
        type: "item",
        id,
        eyebrow: "준비물",
        title: "준비물 수정",
        copy: "이름과 짧은 메모를 바꿀 수 있습니다.",
        name: item.name,
        note: item.note || "",
        showName: true,
        showNote: true,
        submitLabel: "저장"
      });
    }

    function openEditor(state) {
      editorState = state;
      editEyebrow.textContent = state.eyebrow;
      editTitle.textContent = state.title;
      editCopy.textContent = state.copy || "";
      editSaveBtn.textContent = state.submitLabel || "저장";
      editSaveBtn.style.background = state.type === "delete-category" ? "var(--coral)" : "var(--blue)";
      editSaveBtn.style.borderColor = state.type === "delete-category" ? "var(--coral)" : "var(--blue)";

      editNameField.hidden = state.showName === false;
      editNameInput.required = state.showName !== false;
      editNameInput.value = state.name || "";

      editNoteField.hidden = state.showNote !== true;
      editNoteInput.value = state.note || "";

      editDialog.hidden = false;
      window.setTimeout(() => {
        if (state.showName !== false) {
          editNameInput.focus();
          editNameInput.select();
        } else {
          editSaveBtn.focus();
        }
      }, 0);
    }

    function closeEditor() {
      editDialog.hidden = true;
      editorState = null;
      editForm.reset();
    }

    function saveEditor(event) {
      event.preventDefault();
      if (!editorState) return;

      if (editorState.type === "category") {
        const title = editNameInput.value.trim();
        if (!title) return;

        categoryEdits[editorState.id] = {
          ...(categoryEdits[editorState.id] || {}),
          title,
          deleted: false
        };
        saveCategoryEdits();
        render();
        closeEditor();
        return;
      }

      if (editorState.type === "delete-category") {
        const category = findCategory(editorState.id);
        if (category) {
          category.items.forEach((item) => {
            checkedItems.delete(item.id);
            deletedItems.delete(item.id);
          });
        }

        categoryEdits[editorState.id] = {
          ...(categoryEdits[editorState.id] || {}),
          deleted: true
        };

        saveChecked();
        saveDeletedItems();
        saveCategoryEdits();
        render();
        closeEditor();
        return;
      }

      if (editorState.type !== "item") return;

      const id = editorState.id;
      const name = editNameInput.value.trim();
      if (!name) return;

      const note = editNoteInput.value.trim();
      const customItem = customItems.find((entry) => entry.id === id);

      if (customItem) {
        customItem.name = name;
        if (note) {
          customItem.note = note;
        } else {
          delete customItem.note;
        }
        saveCustomItems();
      } else {
        itemEdits[id] = { name, note };
        saveItemEdits();
      }

      render();
      closeEditor();
    }

    function showBurst(button) {
      const burst = document.createElement("span");
      burst.className = "burst";
      button.appendChild(burst);
      window.setTimeout(() => burst.remove(), 540);
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll(".filter-btn").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.filter === filter);
      });
      render();
    }

    function addCategory(event) {
      event.preventDefault();

      const title = categoryNameInput.value.trim();
      if (!title) {
        categoryNameInput.focus();
        return;
      }

      const id = `category-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const mark = String(categories.length + customCategories.length + 1).padStart(2, "0");

      customCategories.push({ id, title, mark, items: [] });
      saveCustomCategories();
      categoryNameInput.value = "";
      render();

      const addedCategory = board.querySelector(`[data-category="${CSS.escape(id)}"]`);
      if (addedCategory) {
        addedCategory.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }

    function addCategoryItem(event) {
      event.preventDefault();

      const form = event.target.closest(".category-item-form");
      if (!form) return;

      const input = form.querySelector(".category-item-input");
      const noteInput = form.querySelector(".category-item-note-input");
      const value = input.value.trim();
      if (!value) {
        input.focus();
        return;
      }

      const categoryId = form.dataset.categoryId;
      const id = `custom-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const note = noteInput ? noteInput.value.trim() : "";

      customItems.push({
        id,
        categoryId,
        name: value,
        ...(note ? { note } : {})
      });
      saveCustomItems();
      input.value = "";
      if (noteInput) noteInput.value = "";
      render();

      const added = board.querySelector(`[data-id="${CSS.escape(id)}"]`);
      if (added) {
        added.scrollIntoView({ behavior: "smooth", block: "center" });
        const addedButton = added.querySelector(".item-main");
        if (addedButton) addedButton.focus({ preventScroll: true });
      }
    }

    function resetChecks() {
      checkedItems = new Set();
      saveChecked();
      render();
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    board.addEventListener("click", (event) => {
      const categoryEditButton = event.target.closest(".category-edit-btn");
      if (categoryEditButton) {
        editCategory(categoryEditButton);
        return;
      }

      const categoryDeleteButton = event.target.closest(".category-delete-btn");
      if (categoryDeleteButton) {
        deleteCategory(categoryDeleteButton);
        return;
      }

      const editButton = event.target.closest(".edit-btn");
      if (editButton) {
        editItem(editButton);
        return;
      }

      const deleteButton = event.target.closest(".delete-btn");
      if (deleteButton) {
        deleteItem(deleteButton);
        return;
      }

      const button = event.target.closest(".item-main");
      if (button) toggleItem(button);
    });

    board.addEventListener("submit", (event) => {
      if (event.target.matches(".category-item-form")) {
        addCategoryItem(event);
      }
    });

    document.querySelectorAll(".filter-btn").forEach((button) => {
      button.addEventListener("click", () => setFilter(button.dataset.filter));
    });

    resetBtn.addEventListener("click", resetChecks);
    categoryAddForm.addEventListener("submit", addCategory);
    editForm.addEventListener("submit", saveEditor);
    editCancelBtn.addEventListener("click", closeEditor);
    editDialog.addEventListener("click", (event) => {
      if (event.target.matches("[data-close-editor]")) closeEditor();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !editDialog.hidden) closeEditor();
    });

    render();

    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
